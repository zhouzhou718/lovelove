<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>我们的日程日记</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:#f7f6f3;color:#1a1a1a;min-height:100vh;-webkit-tap-highlight-color:transparent}
.screen{display:none}.screen.on{display:block}

/* LOGIN */
#scr-login{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;background:#f7f6f3}
#scr-login.on{display:flex}
.login-logo{font-size:48px;color:#D4537E;margin-bottom:12px}
.login-title{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.login-sub{font-size:14px;color:#aaa;margin-bottom:2.5rem}
.role-pick{display:flex;gap:14px;width:100%;max-width:360px;margin-bottom:1.75rem}
.role-card{flex:1;border:2px solid #e8e5df;border-radius:18px;padding:1.5rem .5rem;text-align:center;cursor:pointer;background:#fff;transition:all .18s;user-select:none}
.role-card:active{transform:scale(.96)}
.role-card.sel-f{border-color:#D4537E;background:#FBEAF0}
.role-card.sel-m{border-color:#378ADD;background:#E6F1FB}
.role-symbol{font-size:34px;margin-bottom:10px}
.role-name{font-size:15px;font-weight:600;color:#1a1a1a}
.role-id{font-size:13px;color:#aaa;margin-top:4px;letter-spacing:2px}
.verify-box{width:100%;max-width:360px;background:#fff;border:1px solid #e8e5df;border-radius:18px;padding:1.25rem;margin-bottom:1.25rem}
.verify-label{font-size:13px;color:#aaa;margin-bottom:10px}
.code-input{width:100%;border:1.5px solid #e8e5df;border-radius:10px;padding:13px 16px;font-size:22px;letter-spacing:8px;color:#1a1a1a;background:#f7f6f3;outline:none;text-align:center;font-family:'Courier New',monospace;transition:border-color .15s}
.code-input:focus{border-color:#D4537E;background:#fff}
.verify-err{font-size:13px;color:#c0392b;margin-top:8px;text-align:center;display:none}
.login-btn{width:100%;max-width:360px;padding:15px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;color:#fff;background:#ccc;transition:opacity .15s,background .2s}
.login-btn.f{background:#D4537E}.login-btn.m{background:#378ADD}
.login-btn:active{opacity:.82}

/* APP SHELL */
#scr-app{max-width:480px;margin:0 auto;padding-bottom:72px}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;background:#fff;border-bottom:1px solid #ede9e0;position:sticky;top:0;z-index:20}
.header-left{display:flex;align-items:center;gap:10px}
.cur-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-f{background:#F4C0D1;color:#72243E}.av-m{background:#B5D4F4;color:#0C447C}
.cur-name{font-size:15px;font-weight:700;color:#1a1a1a}
.cur-sub{font-size:12px;color:#aaa;margin-top:1px}
.logout-btn{font-size:13px;color:#aaa;cursor:pointer;border:1px solid #e0ddd5;border-radius:8px;padding:5px 12px;background:none}
.sync-btn{font-size:18px;color:#aaa;cursor:pointer;border:1px solid #e0ddd5;border-radius:8px;padding:3px 10px;background:none;line-height:1}
.sync-btn.spinning{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #ede9e0;display:flex;z-index:20}
.nav-btn{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#ccc;transition:color .15s}
.nav-btn.on-f{color:#D4537E}.nav-btn.on-m{color:#378ADD}
.nav-icon{font-size:20px;line-height:1}.nav-label{font-size:11px;font-weight:500}

/* PAGES */
.page{display:none}.page.on{display:block}

/* DATE BAR */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#fff;margin-bottom:1px}
.date-arrow{width:36px;height:36px;border-radius:50%;border:1px solid #e0ddd5;background:none;cursor:pointer;font-size:20px;color:#555;display:flex;align-items:center;justify-content:center}
.date-arrow:active{background:#f0ede5}
.date-center{text-align:center}
.date-main{font-size:17px;font-weight:700;color:#1a1a1a}
.date-wd{font-size:12px;color:#aaa;margin-top:2px}

/* SUB TABS */
.sub-tabs{display:flex;background:#fff;border-bottom:1px solid #ede9e0}
.sub-tab{flex:1;padding:11px 0;font-size:14px;border:none;background:none;cursor:pointer;color:#bbb;border-bottom:2.5px solid transparent}
.sub-tab.on-f{color:#D4537E;border-bottom-color:#D4537E;font-weight:600}
.sub-tab.on-m{color:#378ADD;border-bottom-color:#378ADD;font-weight:600}
.sec{display:none;padding:16px 18px}.sec.on{display:block}

/* FORM */
.card{background:#fff;border-radius:16px;border:1px solid #ede9e0;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;color:#aaa;margin-bottom:12px;font-weight:500}
.form-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.form-label{font-size:13px;color:#aaa;width:30px;flex-shrink:0}
.fi{flex:1;border:1.5px solid #e8e5df;border-radius:10px;padding:9px 12px;font-size:14px;color:#1a1a1a;background:#f7f6f3;outline:none;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;transition:border-color .15s}
.fi:focus{border-color:#D4537E;background:#fff}
textarea.fi{resize:none}
.cat-wrap{margin-bottom:12px}
.cat-label{font-size:12px;color:#bbb;margin-bottom:7px}
.cat-row{display:flex;gap:7px;flex-wrap:wrap}
.cat-btn{padding:5px 12px;border-radius:20px;border:1px solid #e8e5df;background:#f7f6f3;font-size:12px;cursor:pointer;color:#777}
.cat-btn:active{transform:scale(.95)}
.cat-btn.sel-f{background:#FBEAF0;border-color:#F4C0D1;color:#72243E;font-weight:600}
.cat-btn.sel-m{background:#E6F1FB;border-color:#B5D4F4;color:#0C447C;font-weight:600}
.together-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.together-row input{width:16px;height:16px;accent-color:#639922;cursor:pointer}
.together-row label{font-size:13px;color:#777;cursor:pointer}

/* PHOTO IN FORM */
.form-photo-row{margin-bottom:14px}
.form-photo-label{font-size:12px;color:#bbb;margin-bottom:7px}
.form-photo-area{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.photo-add-btn{width:56px;height:56px;border-radius:10px;border:1.5px dashed #d0cdc7;background:#fafaf8;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:#ccc;flex-shrink:0;position:relative}
.photo-add-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-add-btn:active{border-color:#D4537E;background:#FBEAF0}
.form-thumb-wrap{position:relative;width:56px;height:56px;flex-shrink:0}
.form-thumb{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block;cursor:pointer}
.form-thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);border:none;cursor:pointer;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;line-height:1}
.form-thumb-del:active{background:rgba(192,57,43,.9)}

.add-btn{width:100%;padding:12px;border-radius:12px;border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.add-btn:active{opacity:.82}
.add-btn-f{background:#D4537E}.add-btn-m{background:#378ADD}
.save-btn{margin-top:10px;padding:7px 18px;border-radius:8px;border:1px solid #ddd;background:transparent;font-size:13px;cursor:pointer;color:#888}
.save-btn:active{background:#f0ede5}

/* TIMELINE */
.legend{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:5px;font-size:12px;color:#999}
.lg-dot{width:10px;height:10px;border-radius:3px}
.tl{position:relative;padding-left:48px}
.tl-line{position:absolute;left:22px;top:0;bottom:0;width:1.5px;background:#ede9e0}
.tl-slot{min-height:44px;border-top:1px solid #f0ede5;padding:6px 0 4px;position:relative}
.tl-hl{position:absolute;left:-48px;width:40px;text-align:right;font-size:11px;color:#ccc;top:8px}
.ev-list{display:flex;flex-direction:column;gap:8px}
.ev{padding:10px 34px 10px 12px;position:relative;border-left:3px solid transparent;border-radius:0 8px 8px 0}
.ev-f{background:#FBEAF0;border-left-color:#D4537E}
.ev-m{background:#E6F1FB;border-left-color:#378ADD}
.ev-both{background:#EAF3DE;border-left-color:#639922}
.ev-head{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.ev-time{font-size:11px;color:#999}
.badge{font-size:11px;padding:2px 7px;border-radius:10px}
.badge-f{background:#F4C0D1;color:#72243E}
.badge-m{background:#B5D4F4;color:#0C447C}
.badge-both{background:#C0DD97;color:#27500A}
.badge-cat{background:#f0ede5;color:#888}
.ev-title{font-size:14px;font-weight:600;color:#1a1a1a}
.ev-note{font-size:12px;color:#999;margin-top:3px;line-height:1.5}
.ev-del{position:absolute;right:8px;top:8px;background:none;border:none;cursor:pointer;font-size:18px;color:#ccc;padding:4px;line-height:1;z-index:2;-webkit-tap-highlight-color:rgba(0,0,0,0)}
.ev-del:active{color:#c0392b}
.ev-lock{position:absolute;right:10px;top:10px;font-size:12px;color:#ccc}

/* EVENT PHOTOS in timeline */
.ev-photos{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.ev-photo-thumb{width:60px;height:60px;object-fit:cover;border-radius:7px;cursor:pointer;display:block;flex-shrink:0}

.empty-tl{text-align:center;padding:3rem 0;font-size:14px;color:#ccc}
.note-view{background:#fff;border-radius:16px;border:1px solid #ede9e0;padding:14px 16px;margin-top:16px}
.note-view-label{font-size:12px;color:#bbb;margin-bottom:6px}
.note-view-text{font-size:14px;color:#555;line-height:1.75}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center}
.lightbox.on{display:flex}
.lightbox img{max-width:96vw;max-height:90vh;object-fit:contain;border-radius:4px}
.lightbox-close{position:absolute;top:16px;right:18px;font-size:28px;color:#fff;cursor:pointer;line-height:1;background:none;border:none}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;color:rgba(255,255,255,.7);cursor:pointer;background:none;border:none;padding:0 12px}
.lightbox-prev{left:0}.lightbox-next{right:0}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;margin-bottom:1px}
.cal-month{font-size:18px;font-weight:700;color:#1a1a1a}
.cal-nav{display:flex;gap:8px}
.cal-nav button{width:34px;height:34px;border-radius:50%;border:1px solid #e0ddd5;background:none;cursor:pointer;font-size:18px;color:#555;display:flex;align-items:center;justify-content:center}
.cal-nav button:active{background:#f0ede5}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;padding:6px 10px 4px;border-bottom:1px solid #f0ede5}
.cal-wd{text-align:center;font-size:12px;color:#bbb;font-weight:500;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;padding:4px 10px 10px;gap:2px;margin-bottom:1px}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;cursor:pointer;border-radius:10px;position:relative;transition:background .12s}
.cal-cell:active{background:#f0ede5}
.cal-cell.other-month .cal-num{color:#ddd}
.cal-num{font-size:14px;color:#1a1a1a;font-weight:500;line-height:24px}
.cal-cell.is-today .cal-num{background:#1a1a1a;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.cal-cell.is-sel-f{background:#FBEAF0}.cal-cell.is-sel-m{background:#E6F1FB}
.cal-cell.is-sel-f .cal-num{color:#D4537E;font-weight:700}
.cal-cell.is-sel-m .cal-num{color:#378ADD;font-weight:700}
.cal-dots{display:flex;gap:2px;margin-top:1px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-photo-dot{width:5px;height:5px;border-radius:50%;background:#EF9F27}
.day-preview{background:#fff;padding:16px 18px;border-top:1px solid #f0ede5}
.day-preview-title{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.go-day-btn{font-size:12px;cursor:pointer;border:1px solid #F4C0D1;border-radius:6px;padding:3px 10px;background:none;color:#D4537E}
.preview-list{display:flex;flex-direction:column;gap:8px}
.preview-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:12px}
.pi-f{background:#FBEAF0}.pi-m{background:#E6F1FB}.pi-both{background:#EAF3DE}
.pi-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:20px}
.pi-bar-f{background:#D4537E}.pi-bar-m{background:#378ADD}.pi-bar-both{background:#639922}
.pi-body{flex:1;min-width:0}
.pi-time{font-size:11px;color:#aaa;margin-bottom:2px}
.pi-title{font-size:14px;font-weight:600;color:#1a1a1a}
.pi-note{font-size:12px;color:#999;margin-top:2px}
.pi-photos{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.pi-photo{width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer}
.preview-empty{font-size:14px;color:#ccc;text-align:center;padding:1.5rem 0}

/* 评论区 */
.pi-comment-wrap{margin-top:8px;border-top:1px solid rgba(0,0,0,.06);padding-top:8px}
.pi-comment-existing{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px}
.pi-comment-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:1px}
.pi-comment-bubble{background:rgba(0,0,0,.05);border-radius:0 8px 8px 8px;padding:5px 9px;font-size:12px;color:#444;line-height:1.5;flex:1;position:relative}
.pi-comment-del{position:absolute;right:5px;top:4px;background:none;border:none;cursor:pointer;font-size:12px;color:#bbb;padding:0;line-height:1}
.pi-comment-del:active{color:#c0392b}
.pi-comment-input-row{display:flex;gap:6px;align-items:center}
.pi-comment-input{flex:1;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:5px 12px;font-size:12px;color:#1a1a1a;background:rgba(255,255,255,.7);outline:none;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
.pi-comment-input:focus{border-color:rgba(0,0,0,.2)}
.pi-comment-send{padding:5px 12px;border-radius:16px;border:none;font-size:12px;font-weight:600;cursor:pointer;color:#fff;flex-shrink:0}
.pi-comment-send-f{background:#D4537E}.pi-comment-send-m{background:#378ADD}

/* REVIEW / MILESTONES */
.review-top{background:#fff;padding:16px 18px 12px;border-bottom:1px solid #ede9e0;margin-bottom:1px}
.review-top-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
.review-top-sub{font-size:13px;color:#aaa}
.milestones{padding:14px 18px 0;display:flex;flex-direction:column;gap:10px}
.ms-card{border-radius:16px;border:1px solid;padding:16px 18px;display:flex;align-items:center;gap:16px;position:relative}
.ms-days{font-size:36px;font-weight:700;min-width:72px;text-align:center;line-height:1}
.ms-days-unit{font-size:13px;font-weight:500;margin-top:2px;text-align:center}
.ms-label{font-size:15px;font-weight:600;margin-bottom:4px}
.ms-date{font-size:12px;margin-top:3px}
.ms-del{position:absolute;right:12px;top:12px;background:none;border:none;cursor:pointer;font-size:16px;opacity:.35;padding:2px}
.ms-del:active{opacity:.9}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:9px 22px;border-radius:24px;font-size:14px;color:#fff;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox" onclick="lbBg(event)">
  <button class="lightbox-close" onclick="closeLB()">✕</button>
  <button class="lightbox-prev" onclick="lbNav(-1,event)">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lightbox-next" onclick="lbNav(1,event)">›</button>
</div>

<!-- ════ 登录 ════ -->
<div id="scr-login" class="screen on">
  <div class="login-logo">♡</div>
  <div class="login-title">我们的日程日记</div>
  <div class="login-sub">只属于两个人的私密空间</div>
  <div class="role-pick">
    <div class="role-card" id="card-f" onclick="pickRole('f')">
      <div class="role-symbol">♀</div>
      <div class="role-name">我是女生</div>
      <div class="role-id">ZRL</div>
    </div>
    <div class="role-card" id="card-m" onclick="pickRole('m')">
      <div class="role-symbol">♂</div>
      <div class="role-name">我是男生</div>
      <div class="role-id">GYL</div>
    </div>
  </div>
  <div class="verify-box">
    <div class="verify-label" id="vLabel">选择身份后输入验证码</div>
    <input class="code-input" id="codeInput" type="password"
      placeholder="· · · · · · · ·" maxlength="8"
      oninput="clearErr()" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="verify-err" id="verifyErr">验证码不正确，请重新输入</div>
  </div>
  <button class="login-btn" id="loginBtn" onclick="doLogin()">进入日记本</button>
</div>

<!-- ════ 主应用 ════ -->
<div id="scr-app" class="screen">
  <div class="app-header">
    <div class="header-left">
      <div class="cur-av" id="curAv"></div>
      <div>
        <div class="cur-name" id="curName"></div>
        <div class="cur-sub" id="curSub"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sync-btn" id="syncBtn" onclick="manualSync()" title="同步数据">↻</button>
      <button class="logout-btn" onclick="doLogout()">退出</button>
    </div>
  </div>
  <div id="syncLog" style="font-size:11px;color:#888;text-align:center;padding:4px 18px;background:#fff;border-bottom:1px solid #f0ede5;min-height:4px"></div>

  <!-- 今天 -->
  <div class="page on" id="page-today">
    <div class="date-bar">
      <button class="date-arrow" onclick="shiftDay(-1)">‹</button>
      <div class="date-center">
        <div class="date-main" id="dateMain"></div>
        <div class="date-wd" id="dateWd"></div>
      </div>
      <button class="date-arrow" onclick="shiftDay(1)">›</button>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab" id="stab-write" onclick="showSec('write')">写日程</button>
      <button class="sub-tab" id="stab-tl" onclick="showSec('tl')">时间轴</button>
    </div>

    <!-- 写日程 -->
    <div class="sec" id="sec-write">
      <div class="card">
        <div class="card-title">添加日程</div>
        <div class="form-row">
          <span class="form-label">时间</span>
          <input type="time" id="timeS" value="09:00" class="fi">
        </div>
        <div class="form-row">
          <span class="form-label">事项</span>
          <input type="text" id="evtT" placeholder="做了什么…" class="fi">
        </div>
        <div class="form-row">
          <span class="form-label">备注</span>
          <input type="text" id="evtN" placeholder="心情或补充…" class="fi">
        </div>
        <div class="cat-wrap">
          <div class="cat-label">分类</div>
          <div class="cat-row" id="catRow"></div>
        </div>
        <div class="together-row">
          <input type="checkbox" id="chkTog">
          <label for="chkTog">两人共同完成</label>
        </div>
        <!-- 照片区 -->
        <div class="form-photo-row">
          <div class="form-photo-label">附上照片（可选）</div>
          <div class="form-photo-area" id="formPhotoArea">
            <div class="photo-add-btn" id="photoAddBtn">
              <input type="file" accept="image/*" multiple id="photoInput" onchange="handleFormPhotos(event)">

// ── 工具 ──
function todayStr(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())}
function p2(n){return String(n).padStart(2,'0')}

// ── 云端数据同步（JSONbin.io）──
// JSONbin 是免费的 JSON 存储服务，无需配置，直接可用
const JSONBIN_URL='https://api.jsonbin.io/v3/b';
const JSONBIN_KEY='$2a$10$1DhZoNloCnVf/xnnq57qhunk1h1eh5rsWJ1arFu8wVXmGZeiDmJsa';

async function getBinId(){
  return FIXED_BIN_ID;
}

async function loadFromCloud(){
  try{
    loadFromLocal();
    const binId=await getBinId();
    if(!binId)return;
    const res=await fetch(`${JSONBIN_URL}/${binId}/latest`,{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    console.log('loadFromCloud status:', res.status);
    if(!res.ok){console.warn('load failed:', res.status); return;}
    const wrapper=await res.json();
    console.log('wrapper keys:', Object.keys(wrapper));
    const json=wrapper.record||wrapper;
    console.log('data keys:', Object.keys(json).slice(0,5));
    if(json&&typeof json==='object'){
      S.data=json;
      saveToLocal();
    }
  }catch(e){
    console.warn('云端加载失败，使用本地缓存',e);
  }
}

async function manualSync(){
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');
  const logEl=document.getElementById('syncLog');
  if(logEl) logEl.textContent='同步中…';
  try{
    const binId=await getBinId();
    const res=await fetch(`${JSONBIN_URL}/${binId}/latest`,{
      headers:{'X-Master-Key':JSONBIN_KEY}
    });
    if(logEl) logEl.textContent='状态：'+res.status;
    if(!res.ok){showToast('同步失败 '+res.status, false);btn.classList.remove('spinning');return;}
    const wrapper=await res.json();
    const json=wrapper.record||wrapper;
    if(logEl) logEl.textContent='状态：'+res.status+' keys：'+Object.keys(json).length;
    if(json&&typeof json==='object'){
      S.data=json;
      saveToLocal();
    }
    const activePage=['today','cal','review'].find(p=>document.getElementById('page-'+p).classList.contains('on'));
    if(activePage==='today'){loadNote();if(document.getElementById('sec-tl').classList.contains('on'))renderTL();}

    if(activePage==='review')renderReview();
    showToast('已同步 ✓',true);

  }catch(e){
    if(logEl) logEl.textContent='错误：'+e.message;
    showToast('同步出错',false);
  }
  btn.classList.remove('spinning');
}

async function saveToCloud(){
  try{
    const binId=FIXED_BIN_ID;
    const payload=JSON.stringify(S.data);
    console.log('saveToCloud payload:', payload.slice(0,100));
    const res=await fetch(`${JSONBIN_URL}/${binId}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},
      body:payload
    });
    console.log('saveToCloud status:', res.status);
    const text=await res.text();
    console.log('saveToCloud response:', text.slice(0,200));
    if(!res.ok)throw new Error('更新失败 '+res.status);
    saveToLocal();
    showToast('已同步 ✓', true);
  }catch(e){
    console.warn('云端保存失败',e);
    saveToLocal();
    showToast('网络异常，已暂存到本地',false);
  }
}

function handleFormPhotos(evt){
  const files=Array.from(evt.target.files);
  if(!files.length)return;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const id='ph_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      pendingPhotos[id]=e.target.result;
      renderFormPhotos();
    };
    reader.readAsDataURL(file);
  });
  evt.target.value='';
}
function removePendingPhoto(id){
  delete pendingPhotos[id];
  renderFormPhotos();
}
function renderFormPhotos(){
  const area=document.getElementById('formPhotoArea');

    `<div class="form-thumb-wrap">
      <img class="form-thumb" src="${url}" onclick="openLBurls([${JSON.stringify(url)}],0)">
      <button class="form-thumb-del" onclick="removePendingPhoto('${id}')">✕</button>

  ).join('');

    <input type="file" accept="image/*" multiple id="photoInput" onchange="handleFormPhotos(event)">
    <span>+</span>
  </div>`;
}

// pendingPhotos: {tempId: {dataUrl, file}} — 表单里待上传的本地预览
async function uploadToCloudinary(file){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',CLD_PRESET);
  const res=await fetch(CLD_IMG_URL,{method:'POST',body:fd});
  if(!res.ok)throw new Error('上传失败');
  const json=await res.json();
  // 返回 {publicId, url}
  return {publicId:json.public_id, url:json.secure_url};
}

function cldThumbUrl(publicId,w=120){
  return `https://res.cloudinary.com/${CLD_CLOUD}/image/upload/w_${w},h_${w},c_fill,q_auto,f_auto/${publicId}`;
}
function cldFullUrl(publicId){
  return `https://res.cloudinary.com/${CLD_CLOUD}/image/upload/q_auto,f_auto/${publicId}`;
}

// ── 表单照片（本地预览，添加时再上传）──
function handleFormPhotos(evt){
  const files=Array.from(evt.target.files);
  if(!files.length)return;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const tempId='tmp_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
      pendingPhotos[tempId]={dataUrl:e.target.result,file};
      renderFormPhotos();
    };
    reader.readAsDataURL(file);
  });
  evt.target.value='';
}
function removePendingPhoto(id){
  delete pendingPhotos[id];
  renderFormPhotos();
}
function renderFormPhotos(){
  const area=document.getElementById('formPhotoArea');
  const thumbs=Object.entries(pendingPhotos).map(([id,{dataUrl}])=>
    `<div class="form-thumb-wrap">
      <img class="form-thumb" src="${dataUrl}">
      <button class="form-thumb-del" onclick="removePendingPhoto('${id}')">✕</button>
    </div>`
  ).join('');
  area.innerHTML=thumbs+`<div class="photo-add-btn">
    <input type="file" accept="image/*" multiple id="photoInput" onchange="handleFormPhotos(event)">
    <span>+</span>
  </div>`;
}

// ── 上传并返回 publicId 列表 ──
async function uploadPendingPhotos(){
  const entries=Object.values(pendingPhotos);
  if(!entries.length)return[];
  showToast(`上传照片中 (0/${entries.length})…`,true);
  const results=[];
  for(let i=0;i<entries.length;i++){
    try{
      const{publicId}=await uploadToCloudinary(entries[i].file);
      results.push(publicId);
      showToast(`上传照片中 (${i+1}/${entries.length})…`,true);
    }catch(err){
      showToast('某张照片上传失败，已跳过',false);
    }
  }
  return results;
}

function getEventPhotoThumbUrls(photoIds){
  if(!photoIds||!photoIds.length)return[];
  return photoIds.map(id=>cldThumbUrl(id));

// ── 时间轴（异步渲染照片）──
async function renderTL(){
  const day=S.data[S.curDate]||{events:[],note:''};
  const evs=day.events;
  const tl=document.getElementById('timeline');
  if(!evs.length){
    tl.innerHTML='<div class="empty-tl">今天还没有日程<br><span style="font-size:12px;color:#ddd;display:block;margin-top:4px">去「写日程」添加吧</span></div>';
    document.getElementById('noteView').innerHTML='';
    return;
  }
  const minH=Math.min(...evs.map(e=>parseInt(e.ts)));
  const maxH=Math.max(...evs.map(e=>parseInt(e.ts)))+1;
  const sH=Math.max(6,minH-1),eH=Math.min(24,maxH+1);
  let html='<div class="tl-line"></div>';
  for(let h=sH;h<eH;h++){
    const hh=p2(h);
    const slot=evs.filter(e=>e.ts.startsWith(hh));
    html+=`<div class="tl-slot"><div class="tl-hl">${hh}:00</div>`;
    if(slot.length){
      html+='<div class="ev-list">';
      slot.forEach(e=>{
        const isBoth=e.user==='both',isF=e.user==='f';
        const cls=isBoth?'ev-both':isF?'ev-f':'ev-m';
        const bc=isBoth?'badge-both':isF?'badge-f':'badge-m';
        const bn=isBoth?'两人同行':NAMES[e.user];
        const canDel=e.user===S.user||e.user==='both';
        const hasPhotos=(e.photoIds&&e.photoIds.length>0);
        html+=`<div class="ev ${cls}" id="ev-${e.id}">
          ${canDel?`<button class="ev-del" onclick="delEvent(${e.id})">×</button>`:'<span class="ev-lock">🔒</span>'}
          <div class="ev-head">
            <span class="ev-time">${e.ts}</span>
            <span class="badge ${bc}">${bn}</span>
            <span class="badge badge-cat">${e.cat}</span>
          </div>
          <div class="ev-title">${e.title}</div>
          ${e.note?`<div class="ev-note">${e.note}</div>`:''}
          ${hasPhotos?`<div class="ev-photos" id="evph-${e.id}"><span style="font-size:11px;color:#ccc">加载照片…</span></div>`:''}
        </div>`;
      });
      html+='</div>';
    }
    html+='</div>';
  }
  tl.innerHTML=html;
  document.getElementById('noteView').innerHTML=day.note
    ?`<div class="note-view"><div class="note-view-label">今日小结</div><div class="note-view-text">${day.note}</div></div>`:'';
  // 填充各事件照片
  evs.forEach(e=>{
    if(!e.photoIds||!e.photoIds.length)return;
    const el=document.getElementById('evph-'+e.id);
    if(!el)return;
    const fullUrls=getEventPhotoUrls(e.photoIds);
    const thumbUrls=getEventPhotoThumbUrls(e.photoIds);
    el.innerHTML=thumbUrls.map((thumb,i)=>
      `<img class="ev-photo-thumb" src="${thumb}" data-full="${fullUrls[i]}" data-idx="${i}" data-evid="${e.id}" onclick="lbOpenEv(this)" loading="lazy">`
    ).join('');
  });
}

// ── 日历 ──
function shiftMonth(n){
  S.calM+=n;
  if(S.calM>11){S.calM=0;S.calY++;}
  if(S.calM<0){S.calM=11;S.calY--;}
  renderCal();
}
function renderCal(){
  const y=S.calY,m=S.calM;
  document.getElementById('calMonth').textContent=y+'年'+(m+1)+'月';
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const wd0=first.getDay(),today=todayStr();
  let cells='';
  for(let i=0;i<wd0;i++) cells+=mkCell(new Date(y,m,-wd0+i+1),true,today);
  for(let d=1;d<=last.getDate();d++) cells+=mkCell(new Date(y,m,d),false,today);
  const rem=(7-(wd0+last.getDate())%7)%7;
  for(let i=1;i<=rem;i++) cells+=mkCell(new Date(y,m+1,i),true,today);
  document.getElementById('calGrid').innerHTML=cells;
  renderPreview(S.calSel);
}
function mkCell(date,other,today){
  const ds=toStr(date);
  const evs=(S.data[ds]||{events:[]}).events;
  const hasF=evs.some(e=>e.user==='f'||e.user==='both');
  const hasM=evs.some(e=>e.user==='m'||e.user==='both');
  const hasPhoto=evs.some(e=>e.photoIds&&e.photoIds.length>0);
  let cls='cal-cell';
  if(other)cls+=' other-month';
  if(ds===today)cls+=' is-today';
  if(ds===S.calSel&&ds!==today)cls+=' is-sel-'+S.user;
  const numEl=ds===today
    ?`<div class="cal-num" style="background:#1a1a1a;color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px">${date.getDate()}</div>`
    :`<div class="cal-num">${date.getDate()}</div>`;
  let dots='';
  if(hasF)dots+=`<div class="cal-dot" style="background:#D4537E"></div>`;
  if(hasM)dots+=`<div class="cal-dot" style="background:#378ADD"></div>`;
  if(hasPhoto)dots+=`<div class="cal-photo-dot"></div>`;
  return `<div class="${cls}" onclick="selDay('${ds}')">${numEl}<div class="cal-dots">${dots}</div></div>`;
}
function selDay(ds){S.calSel=ds;renderCal();}
async function renderPreview(ds){
  const[y,m,d]=ds.split('-');
  document.getElementById('previewTitle').textContent=m+'月'+d+'日 星期'+WDS[toDate(ds).getDay()];
  const day=S.data[ds],evs=day?day.events:[];
  const pl=document.getElementById('previewList');
  if(!evs.length){pl.innerHTML='<div class="preview-empty">这天还没有日程记录</div>';return;}
  pl.innerHTML='<div class="preview-list">'+evs.map(e=>{
    const isBoth=e.user==='both',isF=e.user==='f';
    const hasP=e.photoIds&&e.photoIds.length>0;
    // 评论权限：对方的日程或共同日程都可以评论，但每人只能有一条
    const canComment=canAddComment(e);
    const commentHtml=renderCommentBlock(e);
    return `<div class="preview-item ${isBoth?'pi-both':isF?'pi-f':'pi-m'}" id="pi-${e.id}">
      <div class="pi-bar ${isBoth?'pi-bar-both':isF?'pi-bar-f':'pi-bar-m'}"></div>
      <div class="pi-body">
        <div class="pi-time">${e.ts} · ${isBoth?'两人同行':NAMES[e.user]} · ${e.cat}</div>
        <div class="pi-title">${e.title}</div>
        ${e.note?`<div class="pi-note">${e.note}</div>`:''}
        ${hasP?`<div class="pi-photos" id="pip-${e.id}"><span style="font-size:11px;color:#ccc">加载照片…</span></div>`:''}
        ${commentHtml}
      </div>
    </div>`;
  }).join('')+'</div>';
  if(day&&day.note) pl.innerHTML+=`<div class="note-view" style="margin-top:10px"><div class="note-view-label">今日小结</div><div class="note-view-text">${day.note}</div></div>`;
  evs.forEach(e=>{
    if(!e.photoIds||!e.photoIds.length)return;
    const el=document.getElementById('pip-'+e.id);
    if(!el)return;
    const fullUrls=getEventPhotoUrls(e.photoIds);
    const thumbUrls=getEventPhotoThumbUrls(e.photoIds);
    el.innerHTML=thumbUrls.map((thumb,i)=>
      `<img class="pi-photo" src="${thumb}" data-full="${fullUrls[i]}" data-idx="${i}" data-evid="${e.id}" onclick="lbOpenEv(this)" loading="lazy">`
    ).join('');
  });
}
// ── 评论 ──
// comments 结构: {f: {text, time}, m: {text, time}} 存在 event 上
function canAddComment(e){
  // 对方的日程、或共同完成的日程，且当前用户还没有评论
  if(e.user===S.user) return false; // 自己的日程不能评论
  if(e.comments&&e.comments[S.user]) return false; // 已经评论过了
  return true;
}
function renderCommentBlock(e){
  const comments=e.comments||{};
  const hasAny=comments.f||comments.m;
  const canAdd=canAddComment(e);
  if(!hasAny&&!canAdd) return '';
  let html='<div class="pi-comment-wrap">';
  // 已有评论
  ['f','m'].forEach(u=>{
    if(!comments[u]) return;
    const avBg=u==='f'?'#F4C0D1':'#B5D4F4';
    const avColor=u==='f'?'#72243E':'#0C447C';
    const canDel=u===S.user;
    html+=`<div class="pi-comment-existing">
      <div class="pi-comment-av" style="background:${avBg};color:${avColor}">${u==='f'?'她':'他'}</div>
      <div class="pi-comment-bubble">${escHtml(comments[u].text)}
        ${canDel?`<button class="pi-comment-del" onclick="delComment(${e.id})">×</button>`:''}
      </div>
    </div>`;
  });
  // 输入框
  if(canAdd){
    html+=`<div class="pi-comment-input-row">
      <input class="pi-comment-input" id="cmt-${e.id}" placeholder="说点什么…" maxlength="80"
        onkeydown="if(event.key==='Enter')submitComment(${e.id})">
      <button class="pi-comment-send pi-comment-send-${S.user}" onclick="submitComment(${e.id})">发送</button>
    </div>`;
  }
  html+='</div>';
  return html;
}
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function submitComment(evId){
  const input=document.getElementById('cmt-'+evId);
  if(!input) return;
  const text=input.value.trim();
  if(!text){showToast('请输入评论内容',false);return;}
  const day=S.data[S.calSel];
  if(!day) return;
  const ev=day.events.find(e=>e.id===evId);
  if(!ev) return;
  if(!ev.comments) ev.comments={};
  ev.comments[S.user]={text, time: Date.now()};
  await saveDay(S.calSel);
  renderPreview(S.calSel);
  showToast('评论已发送 ♡',true);
}
async function delComment(evId){
  const day=S.data[S.calSel];
  if(!day) return;
  const ev=day.events.find(e=>e.id===evId);
  if(!ev||!ev.comments) return;
  delete ev.comments[S.user];
  await saveDay(S.calSel);
  renderPreview(S.calSel);
  showToast('已删除评论',true);
}

function goToDay(){S.curDate=S.calSel;showPage('today');}

// ── 重要日子 ──
const FIXED_MS=[
  {label:'在一起',date:'2019-04-17',bg:'#FBEAF0',border:'#F4C0D1',numColor:'#D4537E',labelColor:'#99355A',dateColor:'#C06E8A'},
  {label:'领证纪念日',date:'2020-03-27',bg:'#E6F1FB',border:'#B5D4F4',numColor:'#378ADD',labelColor:'#185FA5',dateColor:'#378ADD'},
  {label:'宝宝出生',date:'2020-07-18',bg:'#EAF3DE',border:'#C0DD97',numColor:'#3B6D11',labelColor:'#3B6D11',dateColor:'#639922'},
];
const MS_COLORS=[
  {bg:'#F1EFE8',border:'#D3D1C7',numColor:'#5F5E5A',labelColor:'#444441',dateColor:'#888780'},
  {bg:'#FAEEDA',border:'#FAC775',numColor:'#854F0B',labelColor:'#633806',dateColor:'#BA7517'},
  {bg:'#EEEDFE',border:'#CECBF6',numColor:'#534AB7',labelColor:'#3C3489',dateColor:'#7F77DD'},
  {bg:'#FAECE7',border:'#F5C4B3',numColor:'#993C1D',labelColor:'#712B13',dateColor:'#D85A30'},
];

function daysSince(dateStr){
  return Math.floor((Date.now()-new Date(dateStr+'T00:00:00'))/86400000);
}
function fmtDateCN(dateStr){
  const[y,m,d]=dateStr.split('-');
  return y+'年'+m+'月'+d+'日';
}
function loadCustomMS(){
  return S.data.__milestones||[];
}
async function saveCustomMS(list){
  S.data.__milestones=list;
  await saveToCloud();
}

function renderReview(){
  // 固定纪念日
  document.getElementById('fixedMilestones').innerHTML=FIXED_MS.map(ms=>{
    const days=daysSince(ms.date);
    return `<div class="ms-card" style="background:${ms.bg};border-color:${ms.border}">
      <div>
        <div class="ms-days" style="color:${ms.numColor}">${days}</div>
        <div class="ms-days-unit" style="color:${ms.numColor}">天</div>
      </div>
      <div>
        <div class="ms-label" style="color:${ms.labelColor}">${ms.label}</div>
        <div class="ms-date" style="color:${ms.dateColor}">${fmtDateCN(ms.date)}</div>
      </div>
    </div>`;
  }).join('');

  // 自定义纪念日
  const customs=loadCustomMS();
  const cEl=document.getElementById('customMilestones');
  if(!customs.length){
    cEl.innerHTML='<div style="font-size:13px;color:#ccc;text-align:center;padding:8px 0 16px">还没有自定义纪念日</div>';
  }else{
    cEl.innerHTML=customs.map((ms,i)=>{
      const c=MS_COLORS[i%MS_COLORS.length];
      const days=daysSince(ms.date);
      return `<div class="ms-card" style="background:${c.bg};border-color:${c.border};margin-bottom:10px">
        <div>
          <div class="ms-days" style="color:${c.numColor}">${days}</div>
          <div class="ms-days-unit" style="color:${c.numColor}">天</div>
        </div>
        <div style="flex:1">
          <div class="ms-label" style="color:${c.labelColor}">${ms.label}</div>
          <div class="ms-date" style="color:${c.dateColor}">${fmtDateCN(ms.date)}</div>
        </div>
        <button class="ms-del" onclick="delMilestone(${i})">✕</button>
      </div>`;
    }).join('');
  }

  // 添加按钮主题色
  document.getElementById('addMsBtn').className='add-btn add-btn-'+(S.user||'f');
}

async function addMilestone(){
  const name=document.getElementById('msName').value.trim();
  const date=document.getElementById('msDate').value;
  if(!name){showToast('请填写纪念日名称',false);return;}
  if(!date){showToast('请选择日期',false);return;}
  const list=loadCustomMS();
  list.push({label:name,date});
  await saveCustomMS(list);
  document.getElementById('msName').value='';
  document.getElementById('msDate').value='';
  renderReview();
  showToast('已添加 ✓',true);
}

async function delMilestone(idx){
  const list=loadCustomMS();
  list.splice(idx,1);
  await saveCustomMS(list);
  renderReview();
}

// ── Toast ──
function showToast(msg,ok){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=ok?'#D4537E':'#888';
  t.style.opacity='1';clearTimeout(t._tmr);
  t._tmr=setTimeout(()=>t.style.opacity='0',1800);
}

// 预加载本地缓存
loadFromLocal();

// 自动登录（如果之前登录过）
(async()=>{
  const saved=localStorage.getItem('couple_diary_user');
  if(saved&&CREDS[saved]){
    S.user=saved;
    S.role=saved;
    document.getElementById('scr-login').classList.remove('on');
    document.getElementById('scr-app').classList.add('on');
    await loadFromCloud();
    applyTheme();
    showPage('today');
  }
})();
</script>
